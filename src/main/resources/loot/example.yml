# ============================================================================
#  ПРИМЕР ГЛОБАЛЬНОЙ КАТЕГОРИИ ЛУТА  (loot/<id>.yml)
# ----------------------------------------------------------------------------
#  Один файл = одна категория. ID категории = ИМЯ ФАЙЛА без .yml.
#  Этот файл -> категория с id "example".
#  Точка сундука на арене (locations.yml -> chests -> categories: [...])
#  ссылается на категорию по её id.
#
#  Скопируй файл под новым именем (например loot/common.yml) и правь под себя.
#  Везде -1 = БЕЗ ОГРАНИЧЕНИЯ (unlimited).
# ============================================================================

# Имя категории (MiniMessage). Показывается в редакторе/GUI.
name: "<gray>Пример категории"

# Иконка в GUI. Любой Material (напр. CHEST, DIAMOND, IRON_INGOT).
icon: CHEST

# Вес среди категорий (1..1000): чем больше, тем чаще точка с несколькими
# категориями достаётся этой и тем раньше она резервирует свой минимум сундуков.
weight: 100

# Сколько слотов этой категории заполняется в ОДНОМ сундуке (0..27).
min-per-chest: 2
max-per-chest: 4

# Бюджет слотов этой категории на ВСЮ арену (-1 = без бюджета).
min-per-arena: -1
max-per-arena: -1

# Сколько сундуков этой категории появляется за матч (-1 = без лимита).
min-chests: -1
max-chests: -1

# Свой рефилл в секундах (0 = без рефилла).
refill-seconds: 180

# ----------------------------------------------------------------------------
#  Лут категории. Рукописный формат: {type: MATERIAL, weight: N, amount: N, ...}
#  weight  — относительный вес предмета внутри категории (1..250), по умолч. 1.
#  amount  — размер стака, по умолчанию 1.
#  Доп. поля (name, lore, enchants, potion, effects, color, trim, damage,
#  unbreakable, skull-owner, firework-power) — см. util/Items.fromSpec.
# ----------------------------------------------------------------------------
loot:
  - type: IRON_SWORD
    weight: 20
    amount: 1

  - type: BREAD
    weight: 40
    amount: 5

  - type: GOLDEN_APPLE
    weight: 5
    amount: 1

  - type: IRON_CHESTPLATE
    weight: 10
    amount: 1
    enchants:
      protection: 1

  - type: SPLASH_POTION
    weight: 8
    amount: 1
    potion: STRONG_HEALING
