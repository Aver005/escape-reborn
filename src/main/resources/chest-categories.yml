# ГЛОБАЛЬНАЯ БИБЛИОТЕКА КАТЕГОРИЙ СУНДУКОВ.
#
# Это шаблоны. На арену категория ставится КОПИЕЙ: /escape chestcat copy <id> <арена>.
# Копия живёт в arenas/<арена>/chest-categories.yml и балансится отдельно, не
# задевая оригинал здесь. Точкам сундуков категория назначается мастером:
# /escape chestsetup <арена> (телепорт по точкам + жезлы-раздатчики).
#
# ОТБОР СУНДУКОВ = КВОТЫ ПО КАТЕГОРИЯМ. За матч из точек каждой категории
# случайно ставится min(quota, число точек этой категории) сундуков. Сумма по
# категориям = сколько сундуков в матче. Так состав контролируется, а
# конкретные места плавают от матча к матчу — заученный маршрут не работает.
# Модификатор сессии chest-count-mult (§15) масштабирует квоты всех категорий.
#
# У арены НЕТ ни одной категории => старое поведение: одно случайное
# подмножество chest-count из всех точек, лут 2-4, рефилл из config.yml.
#
# Поля категории:
#   name           — имя (MiniMessage), видно в меню/на жезле
#   icon           — материал иконки жезла/меню
#   loot-min/max   — число заполненных слотов в сундуке (заменяет ванильные 2-4)
#   refill-seconds — время рефилла; 0 = сундук не перезаполняется (лут-однушка)
#   quota          — сколько таких сундуков появляется за матч

categories:

  # обычный: совпадает с прежним дефолтом (лут 2-4, рефилл 180)
  default:
    name: "<gray>Обычный"
    icon: CHEST
    loot-min: 2
    loot-max: 4
    refill-seconds: 180
    quota: 75

  # ходовой: много точек, скромный лут, быстрый рефилл — фон карты
  common:
    name: "<white>Ходовой"
    icon: BARREL
    loot-min: 2
    loot-max: 3
    refill-seconds: 150
    quota: 40

  # редкий: мало, богаче, медленный рефилл — за ним стоит идти
  rare:
    name: "<aqua>Редкий"
    icon: ENDER_CHEST
    loot-min: 3
    loot-max: 5
    refill-seconds: 300
    quota: 12

  # горячая точка: жирный лут, частый рефилл — приманка для драк
  hotspot:
    name: "<red>Горячая точка"
    icon: TRAPPED_CHEST
    loot-min: 4
    loot-max: 6
    refill-seconds: 90
    quota: 6
