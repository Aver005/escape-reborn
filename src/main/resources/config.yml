# Глобальные настройки Escape.
# Почти всё игровое настраивается per-arena в arenas/<id>/arena.yml —
# здесь только значения по умолчанию для новых арен и общие параметры.

defaults:
  min-players: 2
  max-players: 12
  chest-count: 75
  trader-count: 32
  table-count: 5
  duration-seconds: 1200        # 20 минут
  event-interval-seconds: 210
  salary-interval-seconds: 600
  salary-gold: 16
  glow-seconds-before-end: 600
  glow-bonus-gold: 18
  start-delay-seconds: 60       # отсчёт при наборе минимума
  start-delay-full-seconds: 10  # отсчёт при полной арене
  fork-uses: 4                  # прочность вилки в решётках (подстраховка от промахов)
  start-gold: 24

# Продвинутое логирование: /escape debuglog on|off|save|clear|status.
# Включённое — пишет КАЖДОЕ игровое действие (вход, бой, смерть, лут, темки,
# блоки возрождения, стражи, события) в консоль и в собственный кольцевой
# буфер в памяти. /escape debuglog save кладёт буфер в plugins/Escape/logs/.
# enabled переключается командой — правка руками имеет силу до первой команды.
debug-log:
  enabled: false        # состояние логирования (команда пишет сюда же)
  console: true         # дублировать каждую запись в консоль сервера
  buffer-lines: 20000   # сколько последних строк держать в памяти под save

# Кулдауны «Личного помощника», секунды
assistant:
  nearest-chest: 150
  random-player: 240
  nearest-trader: 180
  places: 90

# Рефилл сундуков
chest-refill-seconds: 180

# Блоки возрождения
respawn-block:
  lightning-interval-seconds: 300  # молния по всем установленным блокам
  respawn-delay-seconds: 5         # пауза в спектаторах перед возрождением

# Оффлайн-страж (выход/краш живого игрока)
match:
  # XP — валюта зачарования: стартовый запас уровней и награда за убийство
  start-xp-levels: 50
  kill-xp-levels: 10

themes:
  # Кулдаун на новую темку после броска (сек)
  drop-cooldown-seconds: 60
  # Шанс «Волшебного ключика» за сданную темку (0..1)
  key-chance: 0.10

offline-guard:
  zombie-seconds: 90   # сколько стоит AFK-зомби
  return-seconds: 240  # общее окно возврата (от момента выхода), после — выбытие

# Метательное оружие: ванильные снежки и яйца бьют на 0, в матче — по-настоящему.
# Урон в единицах здоровья (2.0 = одно сердце), 0 = ванильное поведение.
# Броня урон снижает; окно неуязвимости (1 сек) сохраняется, поэтому спам
# в упор не складывается — стрелять надо метко, а запас носить с собой.
projectiles:
  snowball-damage: 2.0  # 1 сердце
  egg-damage: 3.0       # 1.5 сердца — яйца дороже и бьют сильнее

# Удочка-крюк: пойманного игрока рывком тянет к рыбаку.
# Сила = base-strength + power-strength-per-level * уровень «Силы» (POWER)
# на удочке, но не больше max-strength. Ванильно «Силу» на удочку не наложить —
# такие удочки выдаются плагином: enchants в loot.yml/traders.yml или /give.
fishing-hook:
  base-strength: 0.55            # без зачарования — рывок на пару блоков
  power-strength-per-level: 0.30 # Сила V => 0.55 + 1.5 = 2.05, полёт через полкарты
  max-strength: 2.5              # потолок на случай безумных уровней зачарования

# Поджиг в матче: игрок может поджечь огонь (кремень и огниво / огненный шар /
# горящая стрела), но огонь НЕ распространяется и НЕ сжигает блоки — горит только
# там, где зажгли, и гаснет сам через случайное время в диапазоне ниже.
# Свой/чужой огонь можно потушить руками; огонь, бывший на карте изначально,
# потушить нельзя. min == max => фиксированное время. enabled: false => как раньше
# (поджиг в матче запрещён).
fire:
  enabled: true
  min-seconds: 12
  max-seconds: 30
