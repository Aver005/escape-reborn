# МОДИФИКАТОРЫ СЕССИИ («Режим дня», §15).
#
# Каждый матч случайно берёт ОДИН модификатор как кандидата. В лобби игроки
# голосуют «за» (предмет-бюллетень рядом с «Выйти»). Если «за» проголосовало
# БОЛЬШЕ 1/3 стартующих — модификатор применяется на весь матч.
#
# Идея: не новая механика для игрока (учить нечего — прочитал строку), а
# множители/добавки к УЖЕ существующим числам матча. Так каждая сессия ощущается
# иначе без перегрузки. Тексты — MiniMessage, показываются игрокам.
#
# Ключи эффектов (все опциональны; отсутствующий = нейтрально):
#   salary-mult          — множитель зарплаты надзирателей (1.0 = как есть)
#   event-interval-mult  — множитель интервала случайных событий (<1 = чаще)
#   start-gold-mult      — множитель стартового золота (каст/арена)
#   wear-add             — ДОБАВКА к износу генерируемого лута, % (0..99)
#   scrap-mult           — множитель выплат Мусорщика за сломанное
#   refill-mult          — множитель времени рефилла сундуков (<1 = быстрее)
#   chest-count-mult     — множитель числа сундуков на арене
#   night-start          — 1 = матч стартует ночью (атмосфера; включает шанс
#                          Кровавой луны). 0/нет = как обычно.

modifiers:

  gold-rush:
    name: "<gold>Золотая лихорадка"
    icon: GOLD_INGOT
    desc:
      - "<gray>Надзиратели щедры — зарплата вдвое,"
      - "<gray>но скупщик жаден: за хлам платит меньше."
    effects:
      salary-mult: 2.0
      scrap-mult: 0.5

  fragile-day:
    name: "<red>Хрупкий день"
    icon: DAMAGED_ANVIL
    desc:
      - "<gray>Всё снаряжение ещё более ушатанное,"
      - "<gray>зато Мусорщик платит за металлолом щедрее."
    effects:
      wear-add: 15.0
      scrap-mult: 1.6

  frequent-raids:
    name: "<yellow>Частые шмоны"
    icon: SPYGLASS
    desc:
      - "<gray>Случайные события идут заметно чаще."
      - "<gray>Нервный, событийный матч."
    effects:
      event-interval-mult: 0.6

  abundance:
    name: "<green>Изобилие"
    icon: CHEST
    desc:
      - "<gray>Сундуков больше, рефилл быстрее."
      - "<gray>Лутоцентричный замес."
    effects:
      chest-count-mult: 1.35
      refill-mult: 0.6

  scarcity:
    name: "<dark_gray>Сухой закон"
    icon: COBWEB
    desc:
      - "<gray>Мало сундуков, скромное золото."
      - "<gray>Каждый гвоздь на счету — выживание и ПвП."
    effects:
      chest-count-mult: 0.7
      start-gold-mult: 0.5
      salary-mult: 0.6

  dark-day:
    name: "<dark_purple>Тьма"
    icon: COAL
    desc:
      - "<gray>Матч начинается глубокой ночью."
      - "<gray>Атмосферно и тревожно."
    effects:
      night-start: 1

  ration:
    name: "<aqua>Щедрый паёк"
    icon: BREAD
    desc:
      - "<gray>Больше стартового золота и зарплаты."
      - "<gray>Спокойный, богатый матч."
    effects:
      start-gold-mult: 1.5
      salary-mult: 1.3
