# ============================================================================
# Пример тюремных NPC для Escape (traders.yml).
# Копировать в plugins/Escape/traders.yml (лучше при остановленных матчах),
# затем /escape reload.
#
# Тип NPC = имя + товары и/или темки и/или скупка хлама:
#   - есть trades -> торговец (ПКМ открывает магазин);
#   - есть themes -> смотрящий (ПКМ открывает темки);
#   - есть scrap  -> Мусорщик (ПКМ открывает приёмку сломанного за золото);
#   - есть несколько -> совмещённый NPC (ПКМ открывает выбор роли).
#
# scrap (Мусорщик, §14): скупает СЛОМАННОЕ снаряжение. Цена = база(материал)
# x доля износа (чем ушатаннее — тем больше), берёт вещи с износом от
# min-wear-percent. Системку (вилка/проводник/блок/контракты/темки) не берёт.
# Прайс проще всего набивать командой: /escape addscrap <TID> <цена> (предмет
# в руке), порог — /escape scrapwear <TID> <%>.
#
# Формат товара (рукописный, поддерживается наравне с сериализованным):
#   - {type: BREAD, amount: 3, price: 2}   # price — золотые слитки (валюта)
#
# themes — список ID темок из themes.yml (пример: themes-prison.yml рядом).
#
# После правки файла привяжите точки спавна на арене:
#   /escape addvillager ТЮРЬМА БАРЫГА   -> верстак-маркер, ставить в точках
# Точек можно (и нужно) больше, чем параметр арены traders — при старте
# матча точки перемешиваются и заселяется случайное подмножество.
# ============================================================================

traders:
  # Совмещённый NPC: торгует ходовым и подкидывает темки
  БАРЫГА:
    name: "<gold>Барыга"
    trades:
      - {type: BREAD, amount: 3, price: 2}
      - {type: COOKED_BEEF, amount: 2, price: 4}
      - {type: GOLDEN_CARROT, amount: 1, price: 7}
      - {type: ARROW, amount: 8, price: 3}
      - {type: STONE_SWORD, price: 8}
      - {type: SHIELD, price: 12}
      - {type: GOLDEN_APPLE, price: 40}
    themes:
      - РАЗБОРКА
      - МАЛЯВА

  # Чистый торговец: снаряга (в противовес бомж-луту из сундуков — всё целое)
  КЛАДОВЩИК:
    name: "<aqua>Кладовщик"
    trades:
      - {type: IRON_PICKAXE, price: 16}
      - {type: IRON_SHOVEL, price: 10}
      - {type: STONE_AXE, price: 6}
      - {type: CHAINMAIL_HELMET, price: 14}
      - {type: CHAINMAIL_CHESTPLATE, price: 24}
      - {type: CHAINMAIL_LEGGINGS, price: 20}
      - {type: CHAINMAIL_BOOTS, price: 12}
      - {type: SHEARS, price: 4}

  # Повар: дешёвая еда оптом
  ПОВАР:
    name: "<green>Повар"
    trades:
      - {type: BREAD, amount: 6, price: 3}
      - {type: BAKED_POTATO, amount: 6, price: 3}
      - {type: COOKED_CHICKEN, amount: 3, price: 4}
      - {type: PUMPKIN_PIE, amount: 2, price: 5}
      - {type: MILK_BUCKET, price: 6}

  # Чистый смотрящий: только темки, ничем не торгует
  СМОТРЯЩИЙ:
    name: "<red>Смотрящий"
    themes:
      - ШАХТЁРСКАЯ
      - ПРОДПАЁК
      - ОБХОД

  # Чистый Мусорщик: скупает сломанное снаряжение за золото.
  # Цена = база x доля износа. Например, убитая (95%) железная кираса ~ 6 золота,
  # почти целая (30%) ~ 2 золота, целее 25% — не примет вообще.
  МУСОРЩИК:
    name: "<gold>Мусорщик"
    scrap:
      min-wear-percent: 25
      prices:
        WOODEN_SWORD: 2
        WOODEN_PICKAXE: 2
        STONE_SWORD: 2
        STONE_AXE: 2
        STONE_PICKAXE: 2
        LEATHER_HELMET: 2
        LEATHER_CHESTPLATE: 3
        LEATHER_LEGGINGS: 3
        LEATHER_BOOTS: 2
        BOW: 3
        FISHING_ROD: 2
        SHEARS: 2
        GOLDEN_PICKAXE: 3
        DIAMOND_SHOVEL: 8
        CHAINMAIL_HELMET: 4
        CHAINMAIL_CHESTPLATE: 6
        CHAINMAIL_LEGGINGS: 5
        CHAINMAIL_BOOTS: 4
        IRON_HELMET: 5
        IRON_CHESTPLATE: 7
        IRON_LEGGINGS: 6
        IRON_BOOTS: 5
        IRON_PICKAXE: 6
        IRON_SHOVEL: 5

  # ==========================================================================
  # Зелья/безделушки/стреляющее. Полная спека предмета (работает и в loot.yml):
  #   potion: <PotionType>          — базовый тип зелья/стрелы с эффектом
  #   effects: [{type: <эффект>, seconds: N, amplifier: 0}] — кастом-эффекты
  #                                   (для несуществующих в ваниле зелий)
  #   enchants: {<чар>: уровень}    — зачарования (ванильные id: power, punch,
  #                                   quick_charge, multishot, piercing...)
  #   name: "<mm>"                  — своё имя предмета (MiniMessage)
  #   lore: ["<mm>", ...]           — свой лор
  #   color: "#8B4513" | RED        — цвет кожаной брони / зелья (DyeColor)
  #   trim: {pattern: sentry, material: iron} — отделка брони
  #   damage: 50                    — фикс. износ (случайный wear его не трогает)
  #   unbreakable: true             — неломаемый
  #   skull-owner: Ник              — голова игрока
  #   firework-power: 2             — дальность фейерверка
  # Пример: тюремная роба —
  #   {type: LEATHER_CHESTPLATE, color: "#4A4E52", name: "<gray>Роба", price: 6}
  # ==========================================================================

  # Кидательные зелья вреда — дорого
  ХИМИК:
    name: "<dark_purple>Химик"
    trades:
      - {type: SPLASH_POTION, potion: HARMING, price: 30}
      - {type: SPLASH_POTION, potion: STRONG_HARMING, price: 50}
      - {type: SPLASH_POTION, potion: POISON, price: 25}
      - {type: SPLASH_POTION, potion: STRONG_SLOWNESS, price: 22}
      - {type: SPLASH_POTION, potion: WEAKNESS, price: 18}
      - {type: SPLASH_POTION, name: "<dark_gray>Зелье слепоты", effects: [{type: blindness, seconds: 8}], price: 35}
      - {type: LINGERING_POTION, potion: POISON, price: 40}

  # Питьевые зелья поддержки — средне
  ЛЕПИЛА:
    name: "<red>Лепила"
    trades:
      - {type: POTION, potion: HEALING, price: 12}
      - {type: POTION, potion: STRONG_HEALING, price: 22}
      - {type: POTION, potion: REGENERATION, price: 15}
      - {type: POTION, potion: SWIFTNESS, price: 10}
      - {type: POTION, potion: LEAPING, price: 8}
      - {type: POTION, potion: STRENGTH, price: 20}
      - {type: POTION, potion: FIRE_RESISTANCE, price: 14}
      - {type: POTION, potion: SLOW_FALLING, price: 10}

  # Фишечные зелья — дорого
  МУТНЫЙ:
    name: "<dark_gray>Мутный"
    trades:
      - {type: POTION, potion: INVISIBILITY, price: 45}
      - {type: POTION, potion: LONG_INVISIBILITY, price: 70}
      - {type: POTION, potion: NIGHT_VISION, price: 25}
      - {type: POTION, potion: TURTLE_MASTER, price: 35}

  # Безделушки — дёшево
  ШНЫРЬ:
    name: "<yellow>Шнырь"
    trades:
      - {type: SNOWBALL, amount: 16, price: 2}
      - {type: EGG, amount: 16, price: 2}
      - {type: ARROW, amount: 16, price: 4}
      - {type: SPECTRAL_ARROW, amount: 8, price: 6}
      - {type: TIPPED_ARROW, potion: POISON, amount: 4, price: 8}
      - {type: TIPPED_ARROW, potion: SLOWNESS, amount: 4, price: 6}
      - {type: WIND_CHARGE, amount: 4, price: 5}
      - {type: FIREWORK_ROCKET, amount: 3, price: 3}

  # Стреляющее — дорого
  ВЕРТУХАЙ:
    name: "<dark_red>Вертухай"
    trades:
      - {type: BOW, price: 25}
      - {type: BOW, enchants: {power: 1}, price: 40}
      - {type: BOW, enchants: {power: 2, punch: 1}, price: 60}
      - {type: CROSSBOW, price: 30}
      - {type: CROSSBOW, enchants: {quick_charge: 1}, price: 45}
      - {type: CROSSBOW, enchants: {piercing: 2}, price: 50}
      - {type: CROSSBOW, enchants: {multishot: 1}, price: 65}
