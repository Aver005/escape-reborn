# ============================================================================
# Пример темок для Escape (themes.yml) — в паре с traders-prison.yml.
# Копировать в plugins/Escape/themes.yml, затем /escape reload.
#
# Поля:
#   type:    KILLS / ACTIVATE / MINE / FIND / BREAK / LOOT / DELIVERY / COURIER
#   idle:    цель — материал (MINE/FIND/BREAK/DELIVERY) или имя рычага (ACTIVATE)
#   amount:  сколько
#   gold:    награда золотом (+10% шанс «Волшебного ключика» за любую сдачу)
#   turn-in: SELF (выдавшему жителю) | ANY (любому смотрящему) | <ID типа NPC>
# ============================================================================

themes:
  # передачка: свёрток Барыги нужно донести Кладовщику (выпадает при смерти,
  # подобравший может сдать сам и забрать награду)
  МАЛЯВА:
    type: COURIER
    description: "Отнеси передачку Кладовщику. Не вскрывать!"
    amount: 1
    gold: 25
    turn-in: КЛАДОВЩИК

  # заказ на устранение: любое убийство, сдать любому смотрящему
  РАЗБОРКА:
    type: KILLS
    description: "Реши вопрос с одним из сидельцев."
    amount: 1
    gold: 30
    turn-in: ANY

  # добыча: три железные руды, вернуться к тому же жителю
  ШАХТЁРСКАЯ:
    type: MINE
    idle: IRON_ORE
    description: "Накопай три железные руды и возвращайся."
    amount: 3
    gold: 15
    turn-in: SELF

  # доставка с изъятием: пять хлеба заберут при сдаче
  ПРОДПАЁК:
    type: DELIVERY
    idle: BREAD
    description: "Собери пять буханок хлеба для общака."
    amount: 5
    gold: 12
    turn-in: SELF

  # облутать сундуки (первые открытия), сдать любому смотрящему
  ОБХОД:
    type: LOOT
    description: "Пошуруй по пяти нычкам и доложи обстановку."
    amount: 5
    gold: 14
    turn-in: ANY
